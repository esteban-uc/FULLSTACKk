# ===========================================================
# CONFIGURACION - MSPAGOS
# ===========================================================

spring:
  application:
    name: mspagos

  # ==========================
  # MYSQL (Laragon)
  # ==========================
  datasource:
    url: jdbc:mysql://localhost:3306/mspagos
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==========================
  # JPA
  # ==========================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

# Puerto del microservicio
server:
  port: 8084

# ==========================
# COMUNICACION ENTRE MICROSERVICIOS
# ==========================
# URL base del microservicio de Pedidos.
# Se utiliza para notificar el estado del pago sobre el pedido asociado.
microservicio:
  pedidos:
    url: http://localhost:8083/pedidos
