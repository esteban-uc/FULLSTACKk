# ===========================================================
# CONFIGURACION - MSPROMOCIONES
# ===========================================================

spring:
  application:
    name: mspromociones

  # ==========================
  # MYSQL (Laragon)
  # ==========================
  # Recuerda crear la base de datos antes de levantar el servicio:
  # CREATE DATABASE mspromociones;
  datasource:
    url: jdbc:mysql://localhost:3306/mspromociones
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==========================
  # JPA
  # ==========================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

# Puerto del microservicio
server:
  port: 8087
