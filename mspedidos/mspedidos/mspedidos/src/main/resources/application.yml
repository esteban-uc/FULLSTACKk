# ===========================================================
# CONFIGURACION - MSPEDIDOS
# ===========================================================

spring:
  application:
    name: mspedidos

  # ==========================
  # MYSQL (Laragon)
  # ==========================
  datasource:
    url: jdbc:mysql://localhost:3306/mspedidos
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==========================
  # JPA
  # ==========================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

# Puerto del microservicio
server:
  port: 8083

# ==========================
# COMUNICACION ENTRE MICROSERVICIOS
# ==========================
# URL base del microservicio de usuarios (msusuarios)
# Se utiliza para validar que el usuario del pedido exista.
msusuarios:
  url: http://localhost:8081
