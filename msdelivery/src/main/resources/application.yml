# ===========================================================
# CONFIGURACION - MSDELIVERY
# ===========================================================

spring:
  application:
    name: msdelivery

  # ==========================
  # MYSQL (Laragon)
  # ==========================
  datasource:
    url: jdbc:mysql://localhost:3306/msdelivery?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==========================
  # JPA
  # ==========================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

# Puerto del microservicio
server:
  port: 8085

# ==========================
# COMUNICACION ENTRE MICROSERVICIOS
# ==========================
# URL base del microservicio de pedidos (mspedidos)
# Se utiliza para validar que el pedido del delivery exista.
mspedidos:
  url: http://localhost:8083
